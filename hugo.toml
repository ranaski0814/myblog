baseURL = 'https://ranaski0814.github.io/myblog/'
languageCode = 'zh-CN'
defaultContentLanguage = 'zh-CN'
title = 'Rana的数学小屋'
theme = "reimu"
enableEmoji = true
hasCJKLanguage = true

[languages]
  [languages.zh-CN]
    languageCode = 'zh-CN'
    languageName = '简体中文'
    weight = 1
    hasCJKLanguage = true
    title = 'Rana的数学小屋'
    author = 'Rana'

[markup]
  [markup.highlight]
    guessSyntax = true
    noClasses = false
  [markup.tableOfContents]
    startLevel = 1
    endLevel = 4
    ordered = false
  [markup.goldmark]
    [markup.goldmark.extensions]
      [markup.goldmark.extensions.passthrough]
        enable = true
        [markup.goldmark.extensions.passthrough.delimiters]
          block = [['\[', '\]'], ['$$', '$$']]
          inline = [['\(', '\)'], ['$', '$']]

[outputs]
  home = ['HTML', 'RSS']
